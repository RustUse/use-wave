exclude = ["target/**"]
include = [
    ".cargo/*.toml",
    ".clippy.toml",
    ".rustfmt.toml",
    ".taplo.toml",
    "Cargo.toml",
    "deny.toml",
    "shared/**/*.toml",
    "tools/**/*.toml",
]

[formatting]
align_entries = false
allowed_blank_lines = 2
array_auto_collapse = true
array_auto_expand = true
array_trailing_comma = true
column_width = 100
compact_arrays = true
compact_entries = false
compact_inline_tables = false
crlf = false
indent_entries = false
indent_string = "    "
indent_tables = false
inline_table_expand = true
reorder_arrays = true
reorder_inline_tables = true
reorder_keys = true
trailing_newline = true
