name: Publish

on:
    workflow_dispatch:
        inputs:
            crate:
                description: Crate to publish, or `all` for the full workspace in dependency order.
                required: true
                default: all
                type: choice
                options:
                    - all
                    - use-wave
            dry_run:
                description: Run cargo publish in dry-run mode.
                required: true
                default: true
                type: boolean
    push:
        tags:
            - v*.*.*

permissions:
    contents: read

jobs:
    validate:
        name: Validate Before Publish
        runs-on: ubuntu-latest
        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: actions-rust-lang/setup-rust-toolchain@v1
              with:
                  toolchain: 1.95.0
                  components: rustfmt, clippy
                  rustflags: ""
                  cache-workspaces: |
                      . -> target

            - name: Check formatting
              run: cargo fmt --all -- --check

            - name: Lint workspace
              run: cargo clippy --workspace --all-targets --all-features -- -D warnings

            - name: Run tests
              run: cargo test --workspace --all-features

            - name: Check workspace
              run: cargo check --workspace --all-targets --all-features

    publish:
        name: Publish Selected Crates
        needs: validate
        runs-on: ubuntu-latest
        env:
            CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: actions-rust-lang/setup-rust-toolchain@v1
              with:
                  toolchain: 1.95.0

            - name: Resolve publish inputs
              id: inputs
              shell: bash
              run: |
                  crate="${{ github.event.inputs.crate }}"
                  dry_run="${{ github.event.inputs.dry_run }}"

                  if [ -z "$crate" ]; then
                    crate="all"
                  fi

                  if [ -z "$dry_run" ]; then
                    dry_run="true"
                  fi

                  echo "crate=$crate" >> "$GITHUB_OUTPUT"
                  echo "dry_run=$dry_run" >> "$GITHUB_OUTPUT"

            - name: Check publish token for real publish
              if: steps.inputs.outputs.dry_run != 'true'
              shell: bash
              run: |
                  if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
                    echo "CARGO_REGISTRY_TOKEN is required for non-dry-run publish." >&2
                    exit 1
                  fi

            - name: Publish selected crate(s)
              shell: bash
              run: |
                  set -euo pipefail

                  selected="${{ steps.inputs.outputs.crate }}"
                  dry_run="${{ steps.inputs.outputs.dry_run }}"
                  crates=(use-wave)

                  if [ "$selected" != "all" ]; then
                    crates=("$selected")
                  fi

                  args=()
                  if [ "$dry_run" = "true" ]; then
                    args+=(--dry-run)
                  fi

                  for crate in "${crates[@]}"; do
                    echo "Publishing $crate"
                    cargo publish -p "$crate" "${args[@]}"
                  done
