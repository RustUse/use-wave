name: Gitleaks

"on":
    pull_request:
    push:
        branches:
            - main

permissions:
    contents: read

jobs:
    secret-scan:
        name: Secret Scan
        runs-on: ubuntu-latest
        steps:
            - name: Check out repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Run Gitleaks
              uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
              with:
                  config-path: .gitleaks.toml
