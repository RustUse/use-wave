name: Gitleaks

"on":
    pull_request:
    push:
        branches:
            - main

permissions:
    contents: read

jobs:
    secret-scan:
        name: Secret Scan
        runs-on: ubuntu-latest
        steps:
            - name: Check out repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Run Gitleaks
              uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
              with:
                  config-path: .gitleaks.toml
